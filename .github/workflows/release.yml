name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install crepus
        run: cargo install crepus

      - name: Build extension
        run: crepus webext build --app .

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd dist/unpacked
          zip -r "$OLDPWD/rs-vimium-v${VERSION}.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: rs-vimium-*.zip
          generate_release_notes: true
