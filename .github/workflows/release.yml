name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --locked --version 0.2.121

      - name: Install crepus
        run: cargo install crepuscularity-cli

      - name: Build extension
        run: crepus webext build --app .

      - name: Verify runtime assets
        run: |
          test -f dist/unpacked/vendor/runtime.js
          test -f dist/unpacked/vendor/runtime_bg.wasm
          test -f dist/unpacked/src/background.js
          test -f dist/unpacked/src/content.js

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd dist/unpacked
          zip -r "$OLDPWD/rs-vimium-v${VERSION}.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: rs-vimium-*.zip
          generate_release_notes: true
