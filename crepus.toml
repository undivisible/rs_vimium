[[targets]]
type = "webext"
id = "rs-vimium"
app = "."

[targets.extension]
name = "rs_vimium"
version = "1.2.2"
description = "Vim-style keyboard navigation for the web — Rust + Crepuscularity"
minimum_chrome_version = "117.0"

[targets.capabilities]
tabs = true
storage = true
sessions = true
bookmarks = true
history = true
notifications = true
clipboard = true
scripting = true
search = true
favicon = true
background-script = true
content-script = true
host-permissions = ["<all_urls>"]
