<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vimium Options</title>
    <style>
      body{margin:0;background:#111315;color:#f5f0e6;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      #root{max-width:760px;margin:0 auto;padding:24px 20px}
      h1{font-size:22px;font-weight:800;margin:0 0 8px}
      p{font-size:13px;color:#8890a0;margin:0 0 12px}
      .section{border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.025);padding:18px;margin-bottom:16px}
      .section-header{font-size:15px;font-weight:700;margin:0 0 12px;color:#c7b46a}
      label{display:block;margin-bottom:10px;font-size:13px;color:#ccc}
      label span{display:block;margin-bottom:4px;color:#8890a0;font-weight:500}
      input[type="text"],input[type="number"],textarea,select{width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:#0d0f10;color:#f5f0e6;font:13px/1.4 Inter,ui-sans-serif,system-ui,sans-serif;padding:8px 10px;outline:none}
      input:focus,textarea:focus,select:focus{border-color:#f4d35e}
      textarea{min-height:200px;font-family:"SFMono-Regular",Consolas,monospace;font-size:12px;resize:vertical}
      .checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
      .checkbox-row label{display:flex;align-items:center;gap:8px;margin:0;font-size:13px;cursor:pointer}
      .checkbox-row input[type="checkbox"]{accent-color:#f4d35e;width:16px;height:16px}
      .actions{display:flex;gap:10px;margin-top:20px}
      button{border:0;border-radius:6px;font:700 14px/1 Inter,ui-sans-serif,system-ui,sans-serif;padding:10px 20px;cursor:pointer}
      .btn-primary{background:#f4d35e;color:#15130b}
      .btn-secondary{background:rgba(255,255,255,.08);color:#f5f0e6}
      .status{font-size:13px;color:#8ebd6a;margin-top:12px}
      .status.error{color:#e06c6c}
    </style>
  </head>
  <body>
    <div id="root">
      <h1>Vimium</h1>
      <p>Keyboard shortcuts for navigation and control in the spirit of Vim.</p>
      <div class="section">
        <div class="section-header">Key Mappings</div>
        <p>One mapping per line: <code>map keySequence commandName</code>. Lines starting with # are comments.</p>
        <label>
          <span>Custom key mappings:</span>
          <textarea id="keyMappings" rows="12"></textarea>
        </label>
      </div>
      <div class="section">
        <div class="section-header">Scrolling</div>
        <label>
          <span>Scroll step size (px)</span>
          <input type="number" id="scrollStepSize" min="10" max="500" step="10">
        </label>
        <div class="checkbox-row">
          <label><input type="checkbox" id="smoothScroll"> Smooth scrolling</label>
        </div>
      </div>
      <div class="section">
        <div class="section-header">Link Hints</div>
        <label>
          <span>Hint characters</span>
          <input type="text" id="linkHintCharacters" placeholder="sadfjklewcmpgh">
        </label>
        <div class="checkbox-row">
          <label><input type="checkbox" id="filterLinkHints"> Filter hints by typing</label>
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="waitForEnterForFilteredHints"> Wait for Enter when filtering</label>
        </div>
      </div>
      <div class="section">
        <div class="section-header">Search</div>
        <label>
          <span>Default search URL</span>
          <input type="text" id="searchUrl" placeholder="https://www.google.com/search?q=">
        </label>
        <label>
          <span>Custom search engines</span>
          <textarea id="searchEngines" rows="8" style="min-height:120px"></textarea>
        </label>
      </div>
      <div class="section">
        <div class="section-header">New Tab</div>
        <label>
          <span>New tab destination</span>
          <select id="newTabDestination">
            <option value="browserNewTabPage">Browser new tab page</option>
            <option value="vimiumNewTabPage">Vimium new tab page</option>
            <option value="customUrl">Custom URL</option>
          </select>
        </label>
        <label>
          <span>Custom new tab URL</span>
          <input type="text" id="newTabCustomUrl" placeholder="https://...">
        </label>
      </div>
      <div class="section">
        <div class="section-header">Miscellaneous</div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="hideHud"> Hide HUD (heads-up display)</label>
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="grabBackFocus"> Grab back focus on page load</label>
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="regexFindMode"> Use regex in find mode</label>
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="helpDialog_showAdvancedCommands"> Show advanced commands in help</label>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="saveBtn">Save Settings</button>
        <button class="btn-secondary" id="resetBtn">Reset to Defaults</button>
        <button class="btn-secondary" id="exportBtn">Export Settings</button>
      </div>
      <div class="status" id="status"></div>
    </div>
    <script type="module" src="../src/options.js"></script>
  </body>
</html>
