[extension]
name = "Vimium"
version = "2.4.2"
description = "The Hacker's Browser. Vimium provides keyboard shortcuts for navigation and control in the spirit of Vim."

[capabilities]
tabs = true
storage = true
sessions = true
bookmarks = true
history = true
notifications = true
scripting = true
web-navigation = true
search = true
favicon = true
background-script = true
content-script = true
host-permissions = ["<all_urls>"]

[[content_scripts]]
matches = ["<all_urls>"]
js = ["src/content.js"]
css = ["src/content.css"]
run_at = "document_start"
all_frames = true
match_about_blank = true

[[content_scripts]]
matches = ["file:///", "file:///*/"]
css = ["src/content.css"]
run_at = "document_start"
all_frames = true

[options]
icons = { "16" = "icons/icon16.png", "48" = "icons/icon48.png", "128" = "icons/icon128.png" }
options_page = "pages/options.html"
action_popup = "pages/action.html"
background_script = "src/background.js"
extra_resources = ["_favicon/*"]

[web_accessible_resources]
resources = [
    "pages/vomnibar_page.html",
    "content_scripts/vimium.css",
    "pages/hud_page.html",
    "pages/help_dialog_page.html",
    "pages/doc_search_completion.html",
    "pages/command_listing.html",
    "resources/tlds.txt",
    "_favicon/*",
]
matches = ["<all_urls>"]
