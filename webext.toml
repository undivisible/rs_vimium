[extension]
name = "Vimium"
version = "2.4.2"
description = "The Hacker's Browser. Vimium provides keyboard shortcuts for navigation and control in the spirit of Vim."
homepage = "https://github.com/undivisible/rs_vimium"
minimum_chrome_version = "117.0"

[capabilities]
tabs = true
storage = true
sessions = true
bookmarks = true
history = true
notifications = true
clipboard = true
scripting = true
web-navigation = true
search = true
favicon = true
background-script = true
content-script = true
host-permissions = ["<all_urls>"]

[[content_scripts]]
matches = ["<all_urls>"]
js = ["src/content.js"]
css = ["src/content.css"]
run_at = "document_start"
all_frames = true
match_about_blank = true

[[content_scripts]]
matches = ["file:///*"]
css = ["src/file_urls.css"]
run_at = "document_start"
all_frames = true

[options]
icons = { "16" = "icons/icon16.png", "48" = "icons/icon48.png", "128" = "icons/icon128.png" }
action_icons = { "16" = "icons/action_disabled_16.png", "32" = "icons/action_disabled_32.png" }
options_page = "pages/options.html"
action_popup = "pages/action.html"
background_script = "src/background.js"
extra_resources = ["_favicon/*"]

[options.options_ui]
page = "pages/options.html"
browser_style = false
open_in_tab = true

[web_accessible_resources]
resources = [
    "vendor/runtime.js",
    "vendor/runtime_bg.wasm",
    "resources/tlds.txt",
    "_favicon/*",
]
matches = ["<all_urls>"]

[commands._execute_action]
description = "Open Vimium popup"

[commands._execute_action.suggested_key]
default = "Alt+Shift+V"
mac = "Alt+Shift+V"
